services:
  db:
    image: postgres:16-alpine
    container_name: site-diana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: site_diana
      POSTGRES_PASSWORD: site_diana
      POSTGRES_DB: site_diana
    ports:
      - "5433:5432"
    volumes:
      - site_diana_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U site_diana -d site_diana"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  site_diana_pgdata:
